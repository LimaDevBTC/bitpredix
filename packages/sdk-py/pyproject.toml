[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "predix-sdk"
version = "0.1.0"
description = "Python SDK for Predix prediction market"
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
dependencies = [
    "httpx>=0.25.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
langchain = ["langchain-core>=0.1.0"]
crewai = ["crewai>=0.1.0"]
